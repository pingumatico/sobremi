<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.6.1/css/all.css"

    <link rel="stylesheet" href="css/style.css" />

    <title>Contacto</title>

  <body>
    <main>
      <!-- NAVBAR -->
      <header>
        <section class="banner-video">
          <video autoplay muted loop playsinline class="video-bg">
            <source src="./img/Chefs_Kiss.mp4" type="video/mp4">
          </video>

        <nav class="navbar">
          <div class="nav-container">

            <ul id="main-nav" class="txt-btn">
              <li><a href="index.html">Inicio</a></li>
              <li><a href="about.html">Intereses</a></li>
              <li><a class="current" href="contact.html">Contacto</a></li>
            </ul>
          </div>
        </nav>

          <div class="banner-header-text">
            <p class="banner-title"><span>Contáctame</span></p>
          </div>
        </section>
      </header>

      <!-- CONTACTO -->
      <section class="contact section">
        <div class="section-header">
          <p class="title" data-title="Escríbeme o contáctame"></p>
        </div>

        <!-- Discord -->
        <div class="box-contact-features">
          <i class="fas fa-map-marker-alt fa-2x"></i>
          <p class="line-break">Discord</p>

          <p>
            Enlace:
            <span>
              <a
                href="https://discord.gg/4T384QBwkh"
                target="_blank"
                style="color:#00f2ea;"
              >
                RIDES
              </a>
            </span>
          </p>
        </div>

        <!-- YouTube -->
        <div class="box-contact-features">
          <i class="fas fa-mobile-alt fa-2x"></i>
          <p class="line-break">Youtube</p>
          <p>
            Enlace:
            <span>
              <a
                href="https://www.youtube.com/channel/UCXNoWfQXmgTevBkXs6y-ywQ"
                target="_blank"
                style="color:#00f2ea;"
              >
                Pingumático
              </a>
            </span>
          </p>
        </div>

        <!-- Twitter -->
        <div class="box-contact-features">
          <i class="fas fa-envelope fa-2x"></i>
          <p class="line-break">Twitter</p>
          <p class="line-break">Usuario: Proximamente</p>

          <p>
            Enlace:
            <span>
              <a
                href=""
                target="_blank"
                style="color:#00f2ea;"
              >
                Proximamente
              </a>
            </span>
          </p>
        </div>
      </section>

    <hr />

    <footer class="main-footer">
      <div class="container">
        <p class="small">Pingumático 2026 &copy;</p>
    </footer>
