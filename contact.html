      <audio  loop src=""></audio>
<script>
const boton = document.querySelector(".reproductor");
const audio = document.querySelector("audio");
const rutaAudio = "./font/Yus-Investigation.mp3";

window.addEventListener("load", () => {
  const tiempoGuardado = localStorage.getItem("audioTiempo");
  const estabaActivo = localStorage.getItem("audioActivo") === "true";

  if (tiempoGuardado) {
    audio.src = rutaAudio;
    audio.addEventListener("loadedmetadata", () => {
      audio.currentTime = parseFloat(tiempoGuardado);
      if (estabaActivo) {
        audio.play();
      }
    }, { once: true });
  }
});

boton.addEventListener("click", () => {
  audio.src = rutaAudio;
  audio.play();
  localStorage.setItem("audioActivo", "true");
});

audio.addEventListener("timeupdate", () => {
  localStorage.setItem("audioTiempo", audio.currentTime);
});

window.addEventListener("pagehide", () => {
  localStorage.setItem("audioTiempo", audio.currentTime);
  localStorage.setItem("audioActivo", !audio.paused ? "true" : "false");
});
</script>
